name: Daily SEO data collection

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
      PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
      WEDDING_INVITE_2_PAT: ${{ secrets.WEDDING_INVITE_2_PAT }}
      GITHUB_REPO_OWNER: ${{ vars.TARGET_REPO_OWNER }}
      GITHUB_REPO_NAME: ${{ vars.TARGET_REPO_NAME }}
      GSC_SITE_URL: ${{ vars.GSC_SITE_URL }}
      GA4_PROPERTY_ID: ${{ vars.GA4_PROPERTY_ID }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - id: collect-gsc
        run: pnpm collect:search-console
        continue-on-error: true
      - id: collect-ga4
        run: pnpm collect:analytics
        continue-on-error: true
      - id: audit-sitemap
        run: pnpm audit:sitemap
        continue-on-error: true
      - id: audit-robots
        run: pnpm audit:robots
        continue-on-error: true
      - id: audit-structured-data
        run: pnpm audit:structured-data
        continue-on-error: true
      - id: audit-performance
        name: Performance audit (weekly, Mondays only)
        run: |
          if [ "$(date -u +%u)" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pnpm audit:performance
          else
            echo "Not Monday — skipping weekly performance audit."
          fi
        continue-on-error: true
      - id: prioritize
        run: pnpm prioritize
      - id: apply-tier1
        run: pnpm apply:tier1
      - name: Report workflow health
        if: always()
        run: pnpm exec tsx scripts/report-workflow-health.ts "daily-collection" "${{ steps.collect-gsc.outcome }},${{ steps.collect-ga4.outcome }},${{ steps.audit-sitemap.outcome }},${{ steps.audit-robots.outcome }},${{ steps.audit-structured-data.outcome }},${{ steps.audit-performance.outcome }},${{ steps.prioritize.outcome }},${{ steps.apply-tier1.outcome }}" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

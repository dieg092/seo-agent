name: Weekly embeddings and Tier 2 briefing

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

jobs:
  embeddings-and-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
      CLOUDFLARE_WORKER_AI_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_AI_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKER_AI_API_TOKEN_2: ${{ secrets.CLOUDFLARE_WORKER_AI_API_TOKEN_2 }}
      CLOUDFLARE_ACCOUNT_ID_2: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_2 }}
      CLOUDFLARE_WORKER_AI_API_TOKEN_3: ${{ secrets.CLOUDFLARE_WORKER_AI_API_TOKEN_3 }}
      CLOUDFLARE_ACCOUNT_ID_3: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_3 }}
      CLOUDFLARE_WORKER_AI_API_TOKEN_4: ${{ secrets.CLOUDFLARE_WORKER_AI_API_TOKEN_4 }}
      CLOUDFLARE_ACCOUNT_ID_4: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_4 }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - id: generate-embeddings
        run: pnpm generate:embeddings
        continue-on-error: true
      - id: compute-link-suggestions
        run: pnpm compute:link-suggestions
        continue-on-error: true
      - id: prioritize
        run: pnpm prioritize
      - id: generate-briefing
        run: pnpm generate:tier2-briefing
      - uses: actions/upload-artifact@v4
        with:
          name: tier2-briefing
          path: tier2-briefing.md
          retention-days: 30
      - name: Report workflow health
        if: always()
        run: pnpm exec tsx scripts/report-workflow-health.ts "weekly-embeddings-and-briefing" "${{ steps.generate-embeddings.outcome }},${{ steps.compute-link-suggestions.outcome }},${{ steps.prioritize.outcome }},${{ steps.generate-briefing.outcome }}" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

name: Weekly PR status sync

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      WEDDING_INVITE_2_PAT: ${{ secrets.WEDDING_INVITE_2_PAT }}
      GITHUB_REPO_OWNER: ${{ vars.TARGET_REPO_OWNER }}
      GITHUB_REPO_NAME: ${{ vars.TARGET_REPO_NAME }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - id: sync-applied-changes
        run: pnpm sync:applied-changes
      - id: measure-applied-changes
        run: pnpm measure:applied-changes
      - name: Report workflow health
        if: always()
        run: pnpm exec tsx scripts/report-workflow-health.ts "weekly-sync" "${{ steps.sync-applied-changes.outcome }},${{ steps.measure-applied-changes.outcome }}" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

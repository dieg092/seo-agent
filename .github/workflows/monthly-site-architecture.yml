name: Monthly Site Architecture detection

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch: {}

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - id: detect-site-architecture
        run: pnpm detect:site-architecture
      - name: Report workflow health
        if: always()
        run: pnpm exec tsx scripts/report-workflow-health.ts "monthly-site-architecture" "${{ steps.detect-site-architecture.outcome }}" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
